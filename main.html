<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>God Level Dashboard</title>
<link rel="stylesheet" href="design.css">
</head>
<body>

<div class="bg"></div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ GOD PANEL</h2>

  <button class="menu active" onclick="openTab('home', this)">🏠 Home</button>
  <button class="menu" onclick="openTab('stats', this)">📊 Stats</button>
  <button class="menu" onclick="openTab('users', this)">👤 Users</button>

  <button onclick="notify()">🔔 Notify</button>
  <button onclick="toggleTheme()">🌙 Theme</button>
</div>

<!-- MAIN -->
<div class="main">

  <h1 class="title">God Level Dashboard 🚀</h1>

  <!-- HOME -->
  <div id="home" class="tab">

    <div class="cards">

      <div class="card float">
        <h3>Users</h3>
        <p>2,540</p>
      </div>

      <div class="card float delay1">
        <h3>Revenue</h3>
        <p>$18,900</p>
      </div>

      <div class="card float delay2">
        <h3>Visits</h3>
        <p>120K</p>
      </div>

    </div>

  </div>

  <!-- STATS -->
  <div id="stats" class="tab hidden">
    <h2>Live Analytics 📊</h2>
    <div class="bar-container">
      <div class="bar b1"></div>
      <div class="bar b2"></div>
      <div class="bar b3"></div>
      <div class="bar b4"></div>
    </div>
  </div>

  <!-- USERS -->
  <div id="users" class="tab hidden">
    <h2>User Feed</h2>
    <div class="glass">
      <p>Ahmed 👤</p>
      <p>Sara 👤</p>
      <p>Youssef 👤</p>
    </div>
  </div>

</div>

<!-- TOAST -->
<div id="toast" class="toast">🔥 God Action Triggered</div>

<script src="code.js"></script>
</body>
</html>
